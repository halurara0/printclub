<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ PuriPuri Studio ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&family=Pacifico&family=Yomogi&family=Hachi+Maru+Pop&family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6EB4;
    --hot-pink: #FF2D8B;
    --lilac: #C97FFF;
    --sky: #74D7FF;
    --mint: #7FFFD4;
    --yellow: #FFE566;
    --bg: #FFF0F8;
    --white: #FFFFFF;
    --dark: #3A1A3A;
    --shadow: rgba(255,110,180,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,110,180,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(201,127,255,0.15) 0%, transparent 40%);
  }
  .deco { position:fixed; pointer-events:none; z-index:0; font-size:1.5rem; animation:floatDeco 8s ease-in-out infinite; opacity:0.4; }
  .deco:nth-child(1){top:5%;left:3%;animation-delay:0s}
  .deco:nth-child(2){top:15%;right:5%;animation-delay:1.5s}
  .deco:nth-child(3){bottom:20%;left:2%;animation-delay:3s}
  .deco:nth-child(4){bottom:10%;right:3%;animation-delay:4.5s}
  .deco:nth-child(5){top:50%;left:1%;animation-delay:2s}
  @keyframes floatDeco { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-15px) rotate(10deg)} }

.app-wrapper { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:16px; }

.header { text-align:center; padding:16px 0 8px; animation:slideDown 0.6s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
.logo {
font-family:‘Zen Maru Gothic’,sans-serif; font-weight:900; font-size:2.6rem;
background:linear-gradient(135deg,var(–hot-pink),var(–lilac),var(–sky));
-webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
filter:drop-shadow(2px 2px 0px rgba(255,45,139,0.3)); letter-spacing:0.05em;
}
.tagline { font-size:0.82rem; color:var(–pink); letter-spacing:0.15em; margin-top:3px; }

/* Tabs */
.tabs { display:flex; gap:7px; justify-content:center; margin:14px 0 12px; flex-wrap:wrap; }
.tab-btn {
background:white; border:2.5px solid var(–pink); color:var(–hot-pink);
padding:7px 16px; border-radius:50px; cursor:pointer;
font-family:‘M PLUS Rounded 1c’,sans-serif; font-size:0.85rem; font-weight:700;
transition:all 0.2s; box-shadow:2px 2px 0 var(–shadow);
}
.tab-btn:hover{transform:translateY(-2px);box-shadow:3px 4px 0 var(–shadow)}
.tab-btn.active {
background:linear-gradient(135deg,var(–hot-pink),var(–lilac));
border-color:transparent; color:white; transform:translateY(-2px); box-shadow:3px 4px 0 var(–shadow);
}

/* Layout */
.main { display:grid; grid-template-columns:1fr 285px; gap:14px; align-items:start; }
@media(max-width:700px){ .main{grid-template-columns:1fr} }

/* Camera */
.camera-section {
background:white; border-radius:22px; border:3px solid var(–pink);
box-shadow:4px 4px 0 var(–shadow); overflow:hidden;
animation:fadeIn 0.5s ease 0.2s both;
}
@keyframes fadeIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
.camera-header {
background:linear-gradient(135deg,var(–hot-pink),var(–lilac));
color:white; padding:9px 14px; font-weight:700; font-size:0.88rem;
display:flex; align-items:center; gap:8px;
}
.camera-body {
position:relative; aspect-ratio:4/3; overflow:hidden; cursor:crosshair;
}
/* Virtual background */
#bgLayer {
position:absolute; top:0; left:0; right:0; bottom:0;
z-index:1; pointer-events:none;
}
#videoEl { width:100%; height:100%; object-fit:cover; display:block; position:relative; z-index:2; }
#canvasEl { width:100%; height:100%; object-fit:contain; display:none; position:absolute; top:0;left:0; z-index:3; }
#frameOverlay { position:absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:10; }
#stickerLayer { position:absolute; top:0;left:0;right:0;bottom:0; z-index:20; pointer-events:all; }

.placed-sticker {
position:absolute; cursor:move; user-select:none;
font-size:2.5rem; line-height:1; transform-origin:center; transition:transform 0.1s;
}
.placed-sticker:hover{transform:scale(1.1) rotate(5deg)}
.placed-sticker.selected{outline:2px dashed var(–pink);outline-offset:4px}
.sticker-del {
position:absolute; top:-10px; right:-10px;
background:var(–hot-pink); color:white; border:none; border-radius:50%;
width:20px; height:20px; font-size:0.65rem; cursor:pointer;
display:none; align-items:center; justify-content:center; font-weight:700; z-index:30;
}
.placed-sticker.selected .sticker-del{display:flex}

.filter-badge {
position:absolute; top:10px; right:10px;
background:rgba(255,255,255,0.85); border:2px solid var(–pink);
border-radius:20px; padding:3px 10px; font-size:0.72rem; font-weight:700;
color:var(–hot-pink); z-index:5; backdrop-filter:blur(4px);
}

/* Controls */
.camera-controls {
padding:12px 14px; display:flex; gap:8px; align-items:center;
flex-wrap:wrap; border-top:2px dashed rgba(255,110,180,0.2);
}
.btn {
border:none; border-radius:50px; cursor:pointer;
font-family:‘M PLUS Rounded 1c’,sans-serif; font-weight:700;
transition:all 0.2s; display:flex; align-items:center; gap:5px;
}
.btn:hover{transform:translateY(-2px)} .btn:active{transform:translateY(0) scale(0.97)}
.btn-snap { background:linear-gradient(135deg,var(–hot-pink),#FF6EB4); color:white; padding:9px 20px; font-size:0.95rem; box-shadow:0 4px 15px rgba(255,45,139,0.4); flex:1; }
.btn-snap:hover{box-shadow:0 6px 20px rgba(255,45,139,0.5)}
.btn-retake { background:white; border:2.5px solid var(–pink); color:var(–hot-pink); padding:9px 16px; font-size:0.85rem; }
.btn-save { background:linear-gradient(135deg,var(–lilac),var(–sky)); color:white; padding:9px 16px; font-size:0.85rem; box-shadow:0 4px 12px rgba(201,127,255,0.4); }
.btn-cam { background:white; border:2.5px solid var(–sky); color:#0099CC; padding:9px 12px; font-size:0.85rem; }

/* Countdown */
#countdown {
position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
font-family:‘Zen Maru Gothic’,sans-serif; font-size:7rem; font-weight:900;
color:white; text-shadow:0 0 30px var(–hot-pink),0 0 60px var(–lilac);
z-index:50; pointer-events:none; display:none; animation:countPop 0.5s ease;
}
@keyframes countPop { 0%{transform:translate(-50%,-50%) scale(1.5);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
.flash { position:absolute;top:0;left:0;right:0;bottom:0;background:white;z-index:100;opacity:0;pointer-events:none;animation:flashAnim 0.4s ease forwards; }
@keyframes flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }

/* Sidebar */
.sidebar { display:flex; flex-direction:column; gap:12px; animation:fadeIn 0.5s ease 0.4s both; }
.panel {
background:white; border-radius:18px;
border:2.5px solid rgba(255,110,180,0.3);
box-shadow:3px 3px 0 rgba(255,110,180,0.12); overflow:hidden;
}
.panel-header {
background:linear-gradient(135deg,rgba(255,110,180,0.1),rgba(201,127,255,0.1));
padding:8px 13px; font-size:0.78rem; font-weight:800; color:var(–hot-pink);
border-bottom:1.5px dashed rgba(255,110,180,0.2); letter-spacing:0.05em;
}
.panel-body{padding:11px}

/* Filter grid */
.filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.filter-item {
border:2px solid transparent; border-radius:11px; padding:5px 3px;
cursor:pointer; text-align:center; transition:all 0.2s; background:rgba(255,240,248,0.5);
}
.filter-item:hover{transform:scale(1.05);border-color:var(–pink)}
.filter-item.active{border-color:var(–hot-pink);background:rgba(255,110,180,0.1)}
.filter-preview {
width:100%; aspect-ratio:1; border-radius:7px;
background:linear-gradient(135deg,#FFB3D9,#E0B3FF);
margin-bottom:3px; font-size:1.25rem; display:flex;
align-items:center; justify-content:center; overflow:hidden;
}
.filter-name{font-size:0.62rem;font-weight:700;color:var(–dark)}

/* Background grid */
.bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.bg-item {
border:2px solid transparent; border-radius:11px; padding:5px 3px;
cursor:pointer; text-align:center; transition:all 0.2s;
}
.bg-item:hover{transform:scale(1.05);border-color:var(–lilac)}
.bg-item.active{border-color:var(–lilac);box-shadow:0 0 0 2px rgba(201,127,255,0.3)}
.bg-preview {
width:100%; aspect-ratio:1; border-radius:7px;
margin-bottom:3px; display:flex; align-items:center; justify-content:center;
font-size:1.5rem; border:1px solid rgba(0,0,0,0.06); overflow:hidden;
}
.bg-name{font-size:0.62rem;font-weight:700;color:var(–dark)}

/* Sticker */
.sticker-tabs{display:flex;gap:4px;margin-bottom:9px;flex-wrap:wrap}
.sticker-tab {
background:rgba(255,240,248,0.7); border:1.5px solid rgba(255,110,180,0.3);
color:var(–hot-pink); border-radius:20px; padding:3px 9px;
font-size:0.7rem; font-weight:700; cursor:pointer; transition:all 0.15s;
}
.sticker-tab.active{background:var(–hot-pink);color:white;border-color:var(–hot-pink)}
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.sticker-btn {
background:rgba(255,240,248,0.5); border:1.5px solid rgba(255,110,180,0.2);
border-radius:9px; padding:5px 3px; cursor:pointer; text-align:center;
font-size:1.45rem; transition:all 0.15s; aspect-ratio:1;
display:flex; align-items:center; justify-content:center;
}
.sticker-btn:hover{transform:scale(1.2) rotate(-5deg);border-color:var(–pink);background:rgba(255,110,180,0.1);box-shadow:0 3px 10px var(–shadow)}

/* Frame grid */
.frame-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.frame-item {
border:2px solid transparent; border-radius:11px; padding:5px;
cursor:pointer; text-align:center; background:rgba(255,240,248,0.5); transition:all 0.2s;
}
.frame-item:hover{transform:scale(1.05);border-color:var(–lilac)}
.frame-item.active{border-color:var(–lilac);background:rgba(201,127,255,0.1)}
.frame-preview { width:100%; aspect-ratio:4/3; border-radius:7px; margin-bottom:3px; display:flex; align-items:center; justify-content:center; font-size:1.7rem; }
.frame-name{font-size:0.62rem;font-weight:700;color:var(–dark)}

/* Text tool */
.text-tool{display:flex;flex-direction:column;gap:8px}
.text-input-row{display:flex;gap:6px}
.text-input {
flex:1; border:2px solid rgba(255,110,180,0.3); border-radius:10px;
padding:6px 10px; font-family:‘M PLUS Rounded 1c’,sans-serif; font-size:0.85rem;
outline:none; background:rgba(255,240,248,0.5); color:var(–dark);
}
.text-input:focus{border-color:var(–pink)}
.font-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:4px}
.font-item {
border:2px solid rgba(255,110,180,0.2); border-radius:9px; padding:6px 4px;
cursor:pointer; text-align:center; background:rgba(255,240,248,0.4); transition:all 0.15s;
}
.font-item:hover{border-color:var(–pink);background:rgba(255,110,180,0.08)}
.font-item.active{border-color:var(–hot-pink);background:rgba(255,110,180,0.12)}
.font-sample{font-size:1rem;color:var(–dark)}
.font-label{font-size:0.6rem;color:#999;font-weight:700;margin-top:2px}
.color-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.color-dot {
width:22px;height:22px;border-radius:50%;cursor:pointer;
border:2px solid transparent;transition:all 0.15s;flex-shrink:0;
}
.color-dot:hover,.color-dot.active{border-color:var(–dark);transform:scale(1.15)}
.btn-add-text {
background:linear-gradient(135deg,var(–yellow),#FFB347);
color:var(–dark); padding:7px 14px; font-size:0.8rem;
border-radius:20px; border:none; cursor:pointer;
font-family:‘M PLUS Rounded 1c’,sans-serif; font-weight:700; transition:all 0.2s;
}
.btn-add-text:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(255,229,102,0.5)}

/* Strip */
.strip-section {
margin-top:16px; background:white; border-radius:18px;
border:2.5px solid rgba(255,110,180,0.3);
box-shadow:3px 3px 0 rgba(255,110,180,0.12); overflow:hidden;
animation:fadeIn 0.5s ease 0.6s both;
}
.strip-header {
background:linear-gradient(135deg,rgba(255,229,102,0.2),rgba(255,110,180,0.1));
padding:8px 13px; font-size:0.78rem; font-weight:800; color:#CC8800;
border-bottom:1.5px dashed rgba(255,229,102,0.4);
display:flex; justify-content:space-between; align-items:center;
}
.strip-body { padding:10px; display:flex; gap:9px; overflow-x:auto; min-height:78px; align-items:center; }
.strip-body::-webkit-scrollbar{height:4px} .strip-body::-webkit-scrollbar-thumb{background:var(–pink);border-radius:10px}
.strip-photo {
flex-shrink:0; width:88px; height:68px; border-radius:9px; overflow:hidden;
border:2.5px solid var(–pink); cursor:pointer; transition:all 0.2s; position:relative;
}
.strip-photo:hover{transform:scale(1.08) rotate(-2deg);border-color:var(–hot-pink)}
.strip-photo img{width:100%;height:100%;object-fit:cover}
.strip-photo .del-photo {
position:absolute;top:2px;right:2px;background:rgba(255,45,139,0.9);color:white;
border:none;border-radius:50%;width:17px;height:17px;font-size:0.58rem;
cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;opacity:0;transition:opacity 0.2s;
}
.strip-photo:hover .del-photo{opacity:1}
.strip-empty{color:rgba(255,110,180,0.4);font-size:0.78rem;font-weight:700;text-align:center;flex:1}
.btn-clear-strip {
background:rgba(255,110,180,0.1);border:1.5px solid var(–pink);
color:var(–hot-pink);border-radius:20px;padding:3px 9px;
font-size:0.68rem;font-weight:700;cursor:pointer;font-family:‘M PLUS Rounded 1c’,sans-serif;
}

/* Toast */
.toast {
position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
background:linear-gradient(135deg,var(–hot-pink),var(–lilac));color:white;
padding:9px 22px;border-radius:50px;font-weight:700;font-size:0.88rem;
opacity:0;transition:all 0.4s;z-index:9999;pointer-events:none;
box-shadow:0 4px 20px rgba(255,45,139,0.5);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.no-camera-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,0.7);font-size:0.88rem;font-weight:700;z-index:5}
.no-camera-msg .icon{font-size:3rem;display:block;margin-bottom:10px}

/* section label */
.section-label{font-size:0.7rem;font-weight:800;color:#aaa;letter-spacing:0.1em;margin-bottom:6px}
</style>

</head>

// ===== Camera =====
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:960},audio:false});
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    video.style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
    applyVideoFilter();
    document.getElementById('noCameraMsg').style.display = 'none';
    document.getElementById('snapBtn').disabled = false;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('camLabel').textContent = '撮影モード';
    showToast('📷 カメラが起動しました！');
  } catch(e) {
    showToast('⚠️ カメラを起動できませんでした');
  }
}

function applyVideoFilter() {
  document.getElementById('videoEl').style.filter = filterCSS[currentFilter] || '';
}

function toggleMirror() {
  isMirrored = !isMirrored;
  document.getElementById('videoEl').style.transform = isMirrored ? 'scaleX(-1)' : 'scaleX(1)';
  showToast(isMirrored ? '🪞 ミラーON' : '🪞 ミラーOFF');
}

function setTimer() {
  useTimer = !useTimer;
  document.getElementById('timerBtn').textContent = useTimer ? '⏱️ 3秒' : '⚡ 即撮';
  showToast(useTimer ? '⏱️ タイマー3秒ON' : '⚡ 即撮モードON');
}

// ===== Capture =====
async function takePhoto() {
  if (!stream) { showToast('まずカメラを起動してください！'); return; }
  if (useTimer) await countdown();
  capture();
}

function countdown() {
  return new Promise(resolve => {
    const el = document.getElementById('countdown');
    let count = 3;
    el.style.display = 'block'; el.textContent = count;
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        el.style.display='none';
        setTimeout(()=>{ el.style.display='block'; el.textContent=count; el.style.animation='none'; el.offsetHeight; el.style.animation='countPop 0.5s ease'; },50);
      } else {
        el.textContent='📸'; el.style.animation='none'; el.offsetHeight; el.style.animation='countPop 0.3s ease';
        clearInterval(iv);
        setTimeout(()=>{ el.style.display='none'; resolve(); },400);
      }
    },900);
  });
}

function capture() {
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  const ctx = canvas.getContext('2d');
  const body = document.getElementById('cameraBody');
  const w = body.offsetWidth, h = body.offsetHeight;
  canvas.width = w; canvas.height = h;

  // Draw background
  drawBgOnCanvas(ctx, w, h);

  // Draw video
  ctx.save();
  if (isMirrored){ctx.translate(w,0);ctx.scale(-1,1);}
  if (filterCSS[currentFilter]) ctx.filter = filterCSS[currentFilter];
  ctx.drawImage(video,0,0,w,h);
  ctx.restore();
  ctx.filter='none';

  // Draw frame
  drawFrame(ctx,w,h);

  // Draw stickers & text
  const layer = document.getElementById('stickerLayer');
  layer.querySelectorAll('.placed-sticker').forEach(s => {
    const x = parseFloat(s.style.left), y = parseFloat(s.style.top);
    if (s.classList.contains('placed-text')) {
      const size = parseFloat(s.dataset.size||28);
      const font = s.dataset.fontFamily || '"M PLUS Rounded 1c",sans-serif';
      ctx.save();
      ctx.font = `bold ${size}px ${font}`;
      ctx.fillStyle = s.dataset.color||'#FF2D8B';
      ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=3;
      ctx.strokeText(s.dataset.text,x,y+size);
      ctx.fillText(s.dataset.text,x,y+size);
      ctx.restore();
    } else {
      const size = parseFloat(s.style.fontSize)||40;
      const rot = parseFloat(s.dataset.rot||0);
      ctx.save();
      ctx.translate(x+size/2, y+size/2);
      ctx.rotate(rot*Math.PI/180);
      ctx.font=`${size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(s.dataset.emoji,0,0);
      ctx.restore();
    }
  });

  // Flash
  const flash = document.createElement('div');
  flash.className='flash';
  body.appendChild(flash);
  setTimeout(()=>flash.remove(),500);

  video.style.display='none';
  canvas.style.display='block';
  isPhotoMode=true;
  document.getElementById('snapBtn').style.display='none';
  document.getElementById('retakeBtn').style.display='inline-flex';
  document.getElementById('saveBtn').style.display='inline-flex';
  document.getElementById('camLabel').textContent='📸 撮影完了！';

  addToStrip(canvas.toDataURL('image/png'));
  showToast('📸 撮れたよ！かわいい～！');
}

function drawBgOnCanvas(ctx, w, h) {
  const bg = backgrounds.find(b=>b.id===currentBg);
  if (!bg || bg.id==='none') return;
  if (bg.pattern==='hearts') {
    ctx.fillStyle='#FFE8F4'; ctx.fillRect(0,0,w,h);
    ctx.font=`${Math.floor(w*0.04)}px serif`;
    for(let y=0;y<h;y+=50) for(let x=0;x<w;x+=50) ctx.fillText('💕',x,y);
  } else if (bg.pattern==='stars') {
    ctx.fillStyle='#1A1A3A'; ctx.fillRect(0,0,w,h);
    ctx.font=`${Math.floor(w*0.03)}px serif`;
    for(let y=0;y<h;y+=45) for(let x=0;x<w;x+=45) ctx.fillText('⭐',x,y);
  } else if (bg.pattern==='dots') {
    ctx.fillStyle='#FFF0F8'; ctx.fillRect(0,0,w,h);
    const colors=['#FF6EB4','#C97FFF','#74D7FF','#FFE566'];
    for(let y=20;y<h;y+=30) for(let x=20;x<w;x+=30) {
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle=colors[Math.floor((x/30+y/30)%4)]; ctx.fill();
    }
  } else {
    // gradient
    const tempCanvas=document.createElement('canvas'); tempCanvas.width=w; tempCanvas.height=h;
    const tmpCtx=tempCanvas.getContext('2d');
    const div=document.createElement('div'); div.style.background=bg.css;
    // parse gradient with a trick
    const g=tmpCtx.createLinearGradient(0,0,w,h);
    const stops=parseCSSGradient(bg.css);
    stops.forEach(s=>g.addColorStop(s.pos,s.color));
    tmpCtx.fillStyle=g; tmpCtx.fillRect(0,0,w,h);
    ctx.drawImage(tempCanvas,0,0);
  }
}

function parseCSSGradient(css) {
  // Extract colors from linear-gradient
  const match = css.match(/linear-gradient\([^,]+,(.*)\)/);
  if (!match) return [{pos:0,color:css},{pos:1,color:css}];
  const parts = match[1].split(',').map(s=>s.trim());
  return parts.map((c,i)=>({pos:i/(parts.length-1||1),color:c}));
}

function retake() {
  document.getElementById('videoEl').style.display='block';
  document.getElementById('canvasEl').style.display='none';
  isPhotoMode=false;
  document.getElementById('snapBtn').style.display='inline-flex';
  document.getElementById('retakeBtn').style.display='none';

}

function savePhoto() {
  const canvas=document.getElementById('canvasEl');
  const link=document.createElement('a');
  link.download=`puripuri_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
  showToast('💾 保存しました！');
}

// ===== Strip =====
function addToStrip(dataUrl) { photos.push(dataUrl); renderStrip(); }
function renderStrip() {
  const body=document.getElementById('stripBody');
  if(!photos.length){body.innerHTML='<div class="strip-empty">まだ写真がありません。撮影してみよう！🌸</div>';return;}
  body.innerHTML='';
  photos.forEach((src,i)=>{
    const div=document.createElement('div'); div.className='strip-photo';
    div.innerHTML=`<img src="${src}" alt="photo ${i+1}"><button class="del-photo" onclick="event.stopPropagation();deletePhoto(${i})">✕</button>`;
    div.onclick=()=>loadPhoto(i);
    body.appendChild(div);
  });
}
function deletePhoto(i){photos.splice(i,1);renderStrip();}
function loadPhoto(i){
  const canvas=document.getElementById('canvasEl');
  const img=new Image();
  img.onload=()=>{
    const ctx=canvas.getContext('2d'); canvas.width=img.width; canvas.height=img.height;
    ctx.drawImage(img,0,0); canvas.style.display='block';
    document.getElementById('videoEl').style.display='none'; isPhotoMode=true;
    document.getElementById('snapBtn').style.display='none';
    document.getElementById('retakeBtn').style.display='inline-flex';
    document.getElementById('saveBtn').style.display='inline-flex';
  };
  img.src=photos[i];
}
function clearStrip(){photos=[];renderStrip();showToast('🗑️ 写真を全部削除しました');}

// ===== Filters =====
function buildFilterGrid(){
  const grid=document.getElementById('filterGrid');
  filters.forEach(f=>{
    const div=document.createElement('div');
    div.className='filter-item'+(f.id==='none'?' active':'');
    div.innerHTML=`<div class="filter-preview" style="filter:${filterCSS[f.id]||'none'}">${f.emoji}</div><div class="filter-name">${f.name}</div>`;
    div.onclick=()=>selectFilter(f.id,div);
    grid.appendChild(div);
  });
}
function selectFilter(id,el){
  document.querySelectorAll('.filter-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); currentFilter=id; applyVideoFilter();
  const f=filters.find(x=>x.id===id);
  document.getElementById('filterBadge').textContent=f?f.name:'なし';
  showToast(`🎨 ${f.name}フィルター`);
}

// ===== Backgrounds =====

  backgrounds.forEach(b=>{
    const div=document.createElement('div');
    div.className='bg-item'+(b.id==='none'?' active':'');
    const previewStyle=b.pattern?`background:${b.css}`:

    div.innerHTML=`<div class="bg-preview" style="${previewStyle}">${b.emoji}</div><div class="bg-name">${b.name}</div>`;
    div.onclick=()=>selectBg(b.id,div);
    grid.appendChild(div);

}
function selectBg(id,el){
  document.querySelectorAll('.bg-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); currentBg=id;
  applyBgOverlay();
  const b=backgrounds.find(x=>x.id===id);
  showToast(`🖼️ ${b.name}背景`);
}
function applyBgOverlay(){
  const layer=document.getElementById('bgLayer');
  const bg=backgrounds.find(b=>b.id===currentBg);
  if(!bg||bg.id==='none'){layer.style.background=''; layer.innerHTML=''; return;}
  if(bg.pattern==='hearts'){
    layer.style.background='#FFE8F4';
    layer.innerHTML='';
    const c=document.createElement('canvas');
    c.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.5';
    layer.appendChild(c);
    const body=document.getElementById('cameraBody');
    c.width=body.offsetWidth; c.height=body.offsetHeight;
    const ctx=c.getContext('2d'); ctx.font=`${Math.floor(c.width*0.04)}px serif`;
    for(let y=0;y<c.height;y+=50) for(let x=0;x<c.width;x+=50) ctx.fillText('💕',x,y);
  } else if(bg.pattern==='stars'){
    layer.style.background='#1A1A3A'; layer.innerHTML='';
    const c=document.createElement('canvas');
    c.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.7';
    layer.appendChild(c);
    const body=document.getElementById('cameraBody');
    c.width=body.offsetWidth; c.height=body.offsetHeight;
    const ctx=c.getContext('2d'); ctx.font=`${Math.floor(c.width*0.03)}px serif`;
    for(let y=0;y<c.height;y+=45) for(let x=0;x<c.width;x+=45) ctx.fillText(['⭐','✨','💫'][Math.floor(Math.random()*3)],x,y);
  } else if(bg.pattern==='dots'){
    layer.style.background='#FFF0F8'; layer.innerHTML='';
    const c=document.createElement('canvas');
    c.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0';
    layer.appendChild(c);
    const body=document.getElementById('cameraBody');
    c.width=body.offsetWidth; c.height=body.offsetHeight;
    const ctx=c.getContext('2d');
    const colors=['#FF6EB4','#C97FFF','#74D7FF','#FFE566'];
    for(let y=20;y<c.height;y+=30) for(let x=20;x<c.width;x+=30){
      ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle=colors[Math.floor((x/30+y/30)%4)];ctx.fill();
    }
  } else {
    layer.style.background=bg.css; layer.innerHTML='';
  }
  // Make video semi-transparent so background shows
  document.getElementById('videoEl').style.mixBlendMode='multiply';
  document.getElementById('videoEl').style.opacity='0.85';
}

// ===== Stickers =====
let currentStickerCat=Object.keys(stickerCategories)[0];
function buildStickerTabs(){
  const tabs=document.getElementById('stickerTabs');
  Object.keys(stickerCategories).forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='sticker-tab'+(i===0?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>selectStickerCat(cat,btn);
    tabs.appendChild(btn);
  });
  buildStickerGrid(currentStickerCat);
}
function selectStickerCat(cat,el){
  document.querySelectorAll('.sticker-tab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); currentStickerCat=cat; buildStickerGrid(cat);
}
function buildStickerGrid(cat){
  const grid=document.getElementById('stickerGrid'); grid.innerHTML='';
  (stickerCategories[cat]||[]).forEach(emoji=>{
    const btn=document.createElement('button'); btn.className='sticker-btn'; btn.textContent=emoji;
    btn.onclick=()=>placeSticker(emoji); grid.appendChild(btn);
  });
}
function placeSticker(emoji){
  const layer=document.getElementById('stickerLayer');
  const body=document.getElementById('cameraBody');
  const w=body.offsetWidth, h=body.offsetHeight;
  const el=document.createElement('div');
  el.className='placed-sticker'; el.dataset.emoji=emoji;
  el.dataset.rot=Math.floor(Math.random()*20-10);
  el.style.left=(Math.random()*(w-60)+10)+'px';
  el.style.top=(Math.random()*(h-60)+10)+'px';
  el.style.fontSize='2.5rem';
  el.style.transform=`rotate(${el.dataset.rot}deg)`;
  el.textContent=emoji;
  const delBtn=document.createElement('button');
  delBtn.className='sticker-del'; delBtn.textContent='✕';
  delBtn.onclick=(e)=>{e.stopPropagation();el.remove();};
  el.appendChild(delBtn);
  makeDraggable(el); el.onclick=(e)=>{e.stopPropagation();selectSticker(el);};
  layer.appendChild(el); selectSticker(el);
  showToast(`${emoji} スタンプを追加！`);
}
function selectSticker(el){
  if(selectedStickerEl) selectedStickerEl.classList.remove('selected');
  selectedStickerEl=el; el.classList.add('selected');
}
document.addEventListener('click',()=>{
  if(selectedStickerEl){selectedStickerEl.classList.remove('selected');selectedStickerEl=null;}
});
function makeDraggable(el){
  let startX,startY,origLeft,origTop;
  el.addEventListener('mousedown',(e)=>{
    if(e.target.classList.contains('sticker-del'))return;
    e.preventDefault(); startX=e.clientX; startY=e.clientY;
    origLeft=parseFloat(el.style.left); origTop=parseFloat(el.style.top);
    const move=(ev)=>{el.style.left=(origLeft+ev.clientX-startX)+'px';el.style.top=(origTop+ev.clientY-startY)+'px';};
    const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  });
  el.addEventListener('touchstart',(e)=>{
    if(e.target.classList.contains('sticker-del'))return;
    const t=e.touches[0]; startX=t.clientX; startY=t.clientY;
    origLeft=parseFloat(el.style.left); origTop=parseFloat(el.style.top);
    const move=(ev)=>{const tt=ev.touches[0];el.style.left=(origLeft+tt.clientX-startX)+'px';el.style.top=(origTop+tt.clientY-startY)+'px';};
    const end=()=>{document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end);};
    document.addEventListener('touchmove',move,{passive:true});
    document.addEventListener('touchend',end);
  },{passive:true});
}

function buildFrameGrid(){
  const grid=document.getElementById('frameGrid');
  frames.forEach(f=>{
    const div=document.createElement('div');
    div.className='frame-item'+(f.id==='none'?' active':'');
    div.innerHTML=`<div class="frame-preview">${f.emoji}</div><div class="frame-name">${f.name}</div>`;
    div.onclick=()=>selectFrame(f.id,div); grid.appendChild(div);
  });
}
function selectFrame(id,el){
  document.querySelectorAll('.frame-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active'); currentFrame=id; renderFrameOverlay();
  const f=frames.find(x=>x.id===id); showToast(`💟 ${f.name}フレーム`);
}
function renderFrameOverlay(){
  const overlay=document.getElementById('frameOverlay');
  const body=document.getElementById('cameraBody');
  const c=document.createElement('canvas'); c.width=body.offsetWidth; c.height=body.offsetHeight;
  const ctx=c.getContext('2d');
  const frame=frames.find(f=>f.id===currentFrame);
  if(frame&&frame.draw) frame.draw(ctx,c.width,c.height);
  overlay.innerHTML='';
  if(currentFrame!=='none'){
    c.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0;pointer-events:none';
    overlay.appendChild(c);
  }
}
function drawFrame(ctx,w,h){const frame=frames.find(f=>f.id===currentFrame);if(frame&&frame.draw)frame.draw(ctx,w,h);}
function drawHeartsFrame(ctx,w,h){
  ctx.font=`${Math.floor(w*0.06)}px serif`;
  const hearts=['💕','❤️','💖','💗','💓','💝'];
  const step=w/6;
  for(let i=0;i<7;i++){ctx.fillText(hearts[i%hearts.length],i*step-10,30);ctx.fillText(hearts[(i+2)%hearts.length],i*step-10,h-5);}
  const vstep=h/6;
  for(let i=1;i<6;i++){ctx.fillText(hearts[i%hearts.length],2,i*vstep);ctx.fillText(hearts[(i+1)%hearts.length],w-35,i*vstep);}
}
function drawFlowersFrame(ctx,w,h){
  ctx.font=`${Math.floor(w*0.06)}px serif`;
  const f=['🌸','🌺','🌻','🌹','🌼']; const step=w/6;
  for(let i=0;i<7;i++){ctx.fillText(f[i%f.length],i*step-10,30);ctx.fillText(f[(i+2)%f.length],i*step-10,h-5);}
  const vstep=h/5;
  for(let i=1;i<5;i++){ctx.fillText(f[i%f.length],2,i*vstep);ctx.fillText(f[(i+1)%f.length],w-35,i*vstep);}
}
function drawStarsFrame(ctx,w,h){
  ctx.font=`${Math.floor(w*0.05)}px serif`;
  const s=['⭐','✨','💫','🌟','⚡']; const step=w/7;
  for(let i=0;i<8;i++){ctx.fillText(s[i%s.length],i*step-5,28);ctx.fillText(s[(i+1)%s.length],i*step-5,h-3);}
  const vstep=h/5;
  for(let i=1;i<5;i++){ctx.fillText(s[i%s.length],2,i*vstep);ctx.fillText(s[(i+2)%s.length],w-30,i*vstep);}
}
function drawRainbowFrame(ctx,w,h){
  const colors=['#FF0000','#FF7700','#FFEE00','#00CC00','#0088FF','#8800FF'];
  colors.forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=6;ctx.strokeRect(6*i+3,6*i+3,w-6*i*2-6,h-6*i*2-6);});
}
function drawCuteFrame(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'rgba(255,110,180,0.7)');g.addColorStop(0.5,'rgba(201,127,255,0.7)');g.addColorStop(1,'rgba(116,215,255,0.7)');
  ctx.strokeStyle=g; ctx.lineWidth=14; ctx.strokeRect(7,7,w-14,h-14);
  ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.strokeRect(16,16,w-32,h-32);
  ctx.font=`${Math.floor(w*0.07)}px serif`;
  ctx.fillText('🎀',2,36);ctx.fillText('🎀',w-36,36);ctx.fillText('🎀',2,h-2);ctx.fillText('🎀',w-36,h-2);
}
function drawKawaiiFrame(ctx,w,h){
  // Pastel dotted border
  const colors=['#FF6EB4','#C97FFF','#74D7FF','#FFE566'];
  for(let i=0;i<w;i+=20){
    ctx.fillStyle=colors[Math.floor(i/20)%4];
    ctx.beginPath();ctx.arc(i,8,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(i,h-8,6,0,Math.PI*2);ctx.fill();
  }
  for(let i=20;i<h-20;i+=20){
    ctx.fillStyle=colors[Math.floor(i/20)%4];
    ctx.beginPath();ctx.arc(8,i,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w-8,i,6,0,Math.PI*2);ctx.fill();
  }
  ctx.font=`${Math.floor(w*0.06)}px serif`;
  const kawaii=['🩷','🩵','💛','🧡'];
  ctx.fillText(kawaii[0],2,32);ctx.fillText(kawaii[1],w-32,32);
  ctx.fillText(kawaii[2],2,h-2);ctx.fillText(kawaii[3],w-32,h-2);
}

// ===== Fonts =====
function buildFontGrid(){
  const grid=document.getElementById('fontGrid');
  fontOptions.forEach(f=>{
    const div=document.createElement('div');
    div.className='font-item'+(f.id==='rounded'?' active':'');
    div.innerHTML=`<div class="font-sample" style="font-family:${f.family}">${f.sample}</div><div class="font-label">${f.name}</div>`;
    div.onclick=()=>{
      document.querySelectorAll('.font-item').forEach(e=>e.classList.remove('active'));
      div.classList.add('active'); currentFont=f.id;
    };
    grid.appendChild(div);
  });
}

// ===== Text =====
function buildColorPicker(){
  const row=document.getElementById('colorPicker');
  textColors.forEach(c=>{
    const div=document.createElement('div');
    div.className='color-dot'+(c===textColor?' active':'');
    div.style.background=c;
    div.style.boxShadow=c==='#FFFFFF'?'inset 0 0 0 1px #ccc':'none';
    div.onclick=()=>{document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));div.classList.add('active');textColor=c;};
    row.appendChild(div);
  });
}
function addText(){
  const input=document.getElementById('textInput');
  const text=input.value.trim();
  if(!text){showToast('テキストを入力してください！');return;}
  const size=parseInt(document.getElementById('fontSizeSlider').value);
  const fontObj=fontOptions.find(f=>f.id===currentFont)||fontOptions[0];
  const layer=document.getElementById('stickerLayer');
  const body=document.getElementById('cameraBody');
  const w=body.offsetWidth, h=body.offsetHeight;
  const el=document.createElement('div');
  el.className='placed-sticker placed-text';
  el.dataset.text=text; el.dataset.color=textColor;
  el.dataset.size=size; el.dataset.emoji=text;
  el.dataset.fontFamily=fontObj.family;
  el.style.left=(w/2-text.length*size/4)+'px';
  el.style.top=(h/2-size/2)+'px';
  el.style.fontSize=size+'px';
  el.style.color=textColor;
  el.style.fontFamily=fontObj.family;
  el.style.fontWeight='700';
  el.style.textShadow='1px 1px 0 rgba(255,255,255,0.8),-1px -1px 0 rgba(255,255,255,0.6)';
  el.style.whiteSpace='nowrap'; el.style.transform='none'; el.dataset.rot=0;
  el.textContent=text;
  const delBtn=document.createElement('button');
  delBtn.className='sticker-del'; delBtn.textContent='✕';
  delBtn.onclick=(e)=>{e.stopPropagation();el.remove();};
  el.appendChild(delBtn);
  makeDraggable(el); el.onclick=(e)=>{e.stopPropagation();selectSticker(el);};
  layer.appendChild(el); selectSticker(el);
  input.value='';
  showToast(`✏️ テキスト追加！`);
}

// ===== Panels =====
function switchPanel(name){
  ['filters','bg','stickers','frames','text'].forEach(p=>{
    document.getElementById(`panel-${p}`).style.display=p===name?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',i===['filters','bg','stickers','frames','text'].indexOf(name));
  });
  activePanel=name;
}

// ===== Toast =====
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

init();
window.addEventListener('resize',renderFrameOverlay);
</script>
